<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-48.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />
    <meta name="description" content="Kampüs içi ikinci el alışveriş ve takas platformu" />
    <!-- PWA / iOS ana ekrana ekleme -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KampüsTakas" />
    <title>Trakya Kampüs Takas</title>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('ktn_preferences');
          const theme = stored ? JSON.parse(stored).theme : 'dark';
          document.documentElement.classList.toggle('dark', theme !== 'light');
          document.documentElement.style.colorScheme = theme === 'light' ? 'light' : 'dark';
        } catch {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
